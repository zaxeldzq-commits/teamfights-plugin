# =========================================================
#  Teamfights - Config
# =========================================================

teams:
  friendly-fire: false          # si es true, se puede pegar a compas (override con /team ff)
  max-members: 8
  data-file: "teams.yml"

combat:
  # Evita "one-shots" absurdos limitando el % de vida máxima que un solo golpe puede quitar.
  enable-damage-cap: true
  max-damage-percent: 0.55      # un golpe nunca quita más del 55% de la vida máxima de la víctima
  # NethPot ya te da el combate 1.8 (sin attack-cooldown). Este plugin no lo reemplaza,
  # simplemente asume que NethPot está instalado aparte en el servidor.

bard:
  # Radio en bloques para los efectos "clickeable" (afectan al bard + team cercano)
  clickable-radius: 8
  # Sonido/partícula al activar un clickeable
  effect-sound: ENTITY_ILLUSIONER_CAST_SPELL
  effect-particle: WITCH

  # -------------------------------------------------------
  # HOLDABLES: se llevan en la mano OFF-HAND. Mientras el bard
  # los sostenga, recibe el efecto SOLO A SÍ MISMO (no al team),
  # amplifier bajo a propósito para que no rompa el balance.
  # -------------------------------------------------------
  holdables:
    speed_rod:
      material: STICK
      custom-name: "&b&lVara de Velocidad"
      lore:
        - "&7Sostén en la mano secundaria"
        - "&7para obtener &bVelocidad I"
      effect: SPEED
      amplifier: 0        # nivel I
    strength_rod:
      material: BLAZE_ROD
      custom-name: "&c&lVara de Fuerza"
      lore:
        - "&7Sostén en la mano secundaria"
        - "&7para obtener &cFuerza I"
      effect: STRENGTH
      amplifier: 0        # nivel I (NO nivel II, para no romper el balance)
    resistance_rod:
      material: IRON_NUGGET
      custom-name: "&7&lVara de Resistencia"
      lore:
        - "&7Sostén en la mano secundaria"
        - "&7para obtener &7Resistencia I"
      effect: DAMAGE_RESISTANCE
      amplifier: 0        # nivel I

  # -------------------------------------------------------
  # CLICKEABLES: click derecho, tienen cooldown y afectan
  # al bard + compañeros de team dentro del radio.
  # -------------------------------------------------------
  clickables:
    healing_note:
      material: NETHER_STAR
      custom-name: "&d&lNota de Curación"
      lore:
        - "&7Click derecho para dar"
        - "&dRegeneración I &7a tu team cercano"
      effect: REGENERATION
      amplifier: 0
      duration-seconds: 4
      cooldown-seconds: 25
    haste_note:
      material: GOLD_NUGGET
      custom-name: "&e&lNota de Prisa"
      lore:
        - "&7Click derecho para dar"
        - "&eVelocidad II &7a tu team cercano"
      effect: SPEED
      amplifier: 1
      duration-seconds: 5
      cooldown-seconds: 30
    fire_ward_note:
      material: MAGMA_CREAM
      custom-name: "&6&lNota Ígnea"
      lore:
        - "&7Click derecho para dar"
        - "&6Resistencia al Fuego &7a tu team cercano"
      effect: FIRE_RESISTANCE
      amplifier: 0
      duration-seconds: 15
      cooldown-seconds: 45
    absorption_note:
      material: GHAST_TEAR
      custom-name: "&f&lNota de Absorción"
      lore:
        - "&7Click derecho para dar"
        - "&fAbsorción I &7a tu team cercano"
      effect: ABSORPTION
      amplifier: 0
      duration-seconds: 12
      cooldown-seconds: 40
    jump_note:
      material: RABBIT_FOOT
      custom-name: "&a&lNota Saltarina"
      lore:
        - "&7Click derecho para dar"
        - "&aSalto II &7a tu team cercano"
      effect: JUMP
      amplifier: 1
      duration-seconds: 8
      cooldown-seconds: 20
